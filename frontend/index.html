<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          /* Minimal neutral palette — charcoal ink + warm off-white + single muted clay accent */
          indigo: { deep: '#1C1C1A', ink: '#0E0E0C' },       /* charcoal (kept key to avoid rewrites) */
          coral:  { DEFAULT: '#B85C3C', dark: '#8F3F26', light: '#F4EAE3' }, /* muted clay */
          cream:  '#FBFAF7',
          slate:  { soft: '#6B6A66', line: '#E8E5DF' },
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],

<style>
  body { background: #FBFAF7; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; color: #1C1C1A; }
  html { scroll-behavior: smooth; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #D4CFC6; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .fade-in { animation: fadeUp 600ms cubic-bezier(.2,.9,.2,1) forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .view-fade { animation: viewFade 400ms ease forwards; }
  @keyframes viewFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .pulse-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 999px;
    background: #B85C3C; margin-left: 2px;
    animation: pulseDot 1.8s infinite;
  }
  @keyframes pulseDot { 0%,100%{opacity:.4;transform:scale(.9)} 50%{opacity:1;transform:scale(1.2)} }

  .slider {
    -webkit-appearance: none; appearance: none; width: 100%; height: 3px;
    background: rgba(0,0,0,0.1); border-radius: 999px; outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 999px; background: #1C1C1A;
    cursor: pointer; box-shadow: 0 0 0 4px rgba(255,255,255,0.15), 0 2px 8px rgba(0,0,0,0.25);
    transition: transform .15s;
  }
  .slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
  .slider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 999px; background: #1C1C1A;
    cursor: pointer; border: 0;
  }

  /* Muted, low-saturation tonal backgrounds — minimal & editorial */
  .cat-gradient-health    { background: #EEF0EE; }
  .cat-gradient-furniture { background: #F1ECE3; }
  .cat-gradient-games     { background: #ECEBEE; }
  .cat-gradient-travel    { background: #E8EBEA; }
  .cat-gradient-adventure { background: #ECEDE6; }

  /* Minimal accent hairline under headings */
  .editorial-rule { display:inline-block; width: 36px; height: 1px; background: #B85C3C; vertical-align: middle; margin-right: 10px; }

  .confetti-root { position: fixed; inset: 0; pointer-events: none; z-index: 100; overflow: hidden; }
  .confetti { position: absolute; top: -20px; width: 10px; height: 14px; animation: confetti-fall 2.4s linear forwards; opacity: 0.95; }
  @keyframes confetti-fall { 0%{transform:translateY(-10vh) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

  .blob-glow {
    position: absolute; border-radius: 999px; filter: blur(60px); opacity: 0.5;
    pointer-events: none;
  }

  .count-tick { display: inline-block; animation: tick .25s ease-out; }
  @keyframes tick { 0%{transform:translateY(-4px);opacity:.3} 100%{transform:translateY(0);opacity:1} }

  .navlink { position: relative; }
  .navlink::after {
    content: ''; position: absolute; bottom: -4px; left: 50%; width: 0; height: 2px;
    background: #FF5A5F; transition: all .25s; transform: translateX(-50%);
  }
  .navlink:hover::after { width: 100%; }

  /* Onboarding slide transitions */
  .ob-slide {
    visibility: hidden;
    opacity: 0; pointer-events: none;
    transform: translateY(16px);
    transition: opacity 400ms ease, transform 500ms cubic-bezier(.2,.9,.2,1), visibility 0s linear 400ms;
  }
  .ob-slide.active {
    visibility: visible; opacity: 1; pointer-events: auto; transform: translateY(0);
    transition: opacity 400ms ease, transform 500ms cubic-bezier(.2,.9,.2,1), visibility 0s;
  }
</style>
</head>

</html>
