version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sharehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sharehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sharehub_pg_data:/var/lib/postgresql/data

volumes:
  sharehub_pg_data:
